<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bloop</title>
  <style>
    :root {
      --bg: #0b0f14;
      --card: #141c26;
      --border: #243345;
      --text: #e9eef5;
      --muted: #9aafc5;
      --accent: #4cd18a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, #132236, var(--bg));
      min-height: 100vh;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    h1 { margin: 0 0 8px; font-size: 40px; }
    p { color: var(--muted); line-height: 1.5; }
    .grid {
      margin-top: 28px;
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      padding: 16px;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 20px;
    }
    .tag {
      display: inline-block;
      font-size: 12px;
      border: 1px solid #2c4b3b;
      background: #123222;
      color: #90e1b9;
      border-radius: 999px;
      padding: 2px 10px;
      margin-bottom: 10px;
    }
    a {
      color: var(--accent);
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Bloop</h1>
    <p>Local-first terminal productivity tools.</p>

    <section class="grid">
      <article class="card">
        <span class="tag">Available</span>
        <h2>Bloop Flow</h2>
        <p>Offline voice-to-text with auto-paste and transcript history.</p>
        <p><a href="https://github.com/">GitHub repo</a></p>
      </article>

      <article class="card">
        <span class="tag">Planned</span>
        <h2>Bloop Ding</h2>
        <p>Terminal notification sound when your coding agent needs input.</p>
        <p><a href="https://github.com/">Track progress</a></p>
      </article>
    </section>
  </main>
</body>
</html>
